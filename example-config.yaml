# Clash 配置示例 - 使用 thintsing/clash-rules 规则集
# 仓库: https://github.com/thintsing/clash-rules
# 注意: 替换下方 NODE_IP/NODE_PORT/NODE_PASS 为你的实际节点信息

# ==================== 基础配置 ====================
mixed-port: 7897
allow-lan: false
log-level: info
external-controller: :9090
ipv6: false

mode: rule

# ==================== 代理节点 ====================
proxies:
  - name: "Hysteria2-Node"
    type: hysteria2
    server: NODE_IP
    port: NODE_PORT
    password: NODE_PASS
    alpn:
      - h3
    up: 100
    down: 200

# ==================== 代理组 ====================
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - ♻️ 自动选择
      - Hysteria2-Node
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    proxies:
      - Hysteria2-Node
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: "🌍 国外媒体"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "📲 电报信息"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "🤖 AI服务"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "🎮 Steam"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "Ⓜ️ 微软服务"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "🍎 苹果服务"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: "🛑 全球拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - DIRECT

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: :53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  prefer-h3: true
  respect-rules: true

  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - '*.srv.nintendo.net'
    - '*.stun.playstation.net'
    - '*.xbox.*.*.*'
    - '*.xbox.*.*'
    - '*.xbox.*'
    - xbox.*
    - '*.xboxlive.*'
    - '*.msftncsi.com'
    - www.msftconnecttest.com
    - '*.msftconnecttest.com'
    - msftconnecttest.com
    - '*.stun.*'
    - stun.*
    - '*.stun.*.*'
    - '*.stun.*.*.*'
    - time.*.com
    - ntp.*.com
    - '+.market.xiaomi.com'
    - localhost.ptlogin2.qq.com
    - '*.ipswcdn.*'
    - '*.ipsw.dev'
    - '*.icloud.com'
    - '*.icloud-content.com'

  default-nameserver:
    - 223.6.6.6
    - 119.29.29.29
    - 114.114.114.114

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - tls://dns.alidns.com
    - tls://dns.pub

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - tls://223.5.5.5

  fallback:
    - tls://1.1.1.1
    - tls://8.8.8.8
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
      - '+.github.com'
      - '+.openai.com'
      - '+.telegram.org'
      - '+.twitter.com'
      - '+.x.com'
      - '+.reddit.com'
      - '+.discord.com'
      - '+.netflix.com'
      - '+.spotify.com'
      - '+.pixiv.net'
      - '+.twitch.tv'

  nameserver-policy:
    'geosite:cn': https://doh.pub/dns-query
    '+.baidu.com': https://doh.pub/dns-query
    '+.qq.com': https://doh.pub/dns-query
    '+.taobao.com': https://doh.pub/dns-query
    '+.weixin.com': https://doh.pub/dns-query
    # 以下域名强制使用境外 DNS（避免被污染）
    '+.tiktok.com': tls://1.1.1.1
    '+.chatgpt.com': tls://1.1.1.1
    '+.openai.com': tls://1.1.1.1
    '+.anthropic.com': tls://1.1.1.1
    '+.github.com': tls://8.8.8.8
    '+.telegram.org': tls://8.8.8.8

hosts: {}

